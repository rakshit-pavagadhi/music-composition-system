<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Music Composition System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="auth-box">
            <h2 id="form-title">🎵 Welcome Back</h2>
            <p>Sign in to create amazing music with AI</p>
            <form onsubmit="event.preventDefault(); handleAuth();">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" id="auth-btn">Login</button>
            </form>
            <p class="toggle-text" id="toggle-text">
                Don't have an account? <a href="#" onclick="toggleAuth(); return false;">Register</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
